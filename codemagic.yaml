workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: 16.4
      node: 20.20.0
      cocoapods: default
      vars:
        BUNDLE_ID: "com.chatcv"
        XCODE_WORKSPACE: "ios/ChatApp.xcworkspace"
        XCODE_SCHEME: "ChatApp"
    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS (simulator - verify compilation)
        script: |
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            EXCLUDED_ARCHS=x86_64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - /tmp/xcodebuild_logs/*.log

    # publishing disabled for testing — enable when ready for TestFlight
    # publishing:
    #   app_store_connect:
    #     auth: integration
    #     submit_to_testflight: true
