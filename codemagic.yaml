workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: 16.4
      node: 20.20.0
      cocoapods: default
      vars:
        BUNDLE_ID: "com.chatcv"
        XCODE_WORKSPACE: "ios/ChatApp.xcworkspace"
        XCODE_SCHEME: "ChatApp"
    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS (device - verify compilation)
        script: |
          set -o pipefail
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            2>&1 | tee /tmp/xcode_build.log
          BUILD_RESULT=${PIPESTATUS[0]}
          if [ $BUILD_RESULT -ne 0 ]; then
            echo "=== FIRST 5 ERRORS ==="
            grep -n " error:" /tmp/xcode_build.log | grep -v "^[0-9]*:note:" | head -5
            echo ""
            echo "=== FULL ERROR CONTEXT (first error) ==="
            FIRST_ERR=$(grep -n " error:" /tmp/xcode_build.log | grep -v "^[0-9]*:note:" | head -1 | cut -d: -f1)
            if [ -n "$FIRST_ERR" ]; then
              START=$((FIRST_ERR - 5))
              END=$((FIRST_ERR + 20))
              sed -n "${START},${END}p" /tmp/xcode_build.log
            fi
          fi
          exit $BUILD_RESULT

    artifacts:
      - /tmp/xcode_build.log

    # publishing disabled for testing — enable when ready for TestFlight
    # publishing:
    #   app_store_connect:
    #     auth: integration
    #     submit_to_testflight: true
