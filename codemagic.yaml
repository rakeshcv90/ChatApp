workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: 16.4
      node: 20.20.0
      cocoapods: default
      vars:
        BUNDLE_ID: "com.chatcv"
        XCODE_WORKSPACE: "ios/ChatApp.xcworkspace"
        XCODE_SCHEME: "ChatApp"
    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS (device - verify compilation)
        script: |
          set -o pipefail
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/xcode_build.log
          BUILD_RESULT=${PIPESTATUS[0]}
          if [ $BUILD_RESULT -ne 0 ]; then
            echo "=== COMPILER ERRORS ==="
            grep " error:" /tmp/xcode_build.log | grep -v "^note:" | head -80
          fi
          exit $BUILD_RESULT

    artifacts:
      - /tmp/xcode_build.log

    # publishing disabled for testing — enable when ready for TestFlight
    # publishing:
    #   app_store_connect:
    #     auth: integration
    #     submit_to_testflight: true
