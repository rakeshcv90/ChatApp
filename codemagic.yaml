workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: 16.4
      node: 20.20.0
      cocoapods: default
      vars:
        BUNDLE_ID: "com.chatcv"
        XCODE_WORKSPACE: "ios/ChatApp.xcworkspace"
        XCODE_SCHEME: "ChatApp"
    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Patch Pods for Xcode 16.4 compatibility
        script: |
          cd ios

          # 1. gRPC-Core basic_seq.h — remove invalid 'template' keyword (causes xds_wrr_locality.cc error)
          for f in \
            "Pods/gRPC-Core/src/core/lib/promise/detail/basic_seq.h" \
            "Pods/gRPC-C++/src/core/lib/promise/detail/basic_seq.h"; do
            if [ -f "$f" ]; then
              sed -i '' 's/Traits::template CallSeqFactory/Traits::CallSeqFactory/g' "$f"
              echo "Patched basic_seq.h: $f"
            fi
          done

          # 2. gRPC-Core promise_like.h — replace removed std::result_of with std::invoke_result
          for f in \
            "Pods/gRPC-Core/src/core/lib/promise/detail/promise_like.h" \
            "Pods/gRPC-C++/src/core/lib/promise/detail/promise_like.h"; do
            if [ -f "$f" ]; then
              sed -i '' 's/typename std::result_of<F()>::type/typename std::invoke_result<F>::type/g' "$f"
              sed -i '' 's/std::result_of<F()>::type/std::invoke_result<F>::type/g' "$f"
              echo "Patched promise_like.h: $f"
            fi
          done

          # 3. BoringSSL-GRPC xcconfigs — remove -GCC_WARN_INHIBIT_ALL_WARNINGS (invalid flag for arm64)
          for f in "Pods/Target Support Files/BoringSSL-GRPC/"*.xcconfig; do
            if [ -f "$f" ]; then
              sed -i '' 's/-GCC_WARN_INHIBIT_ALL_WARNINGS/-w/g' "$f"
              echo "Patched BoringSSL xcconfig: $f"
            fi
          done

          echo "All patches applied successfully"

      - name: Build iOS (device - verify compilation)
        script: |
          set -o pipefail
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            2>&1 | tee /tmp/xcode_build.log
          BUILD_RESULT=${PIPESTATUS[0]}
          if [ $BUILD_RESULT -ne 0 ]; then
            echo "=== FIRST 5 ERRORS ==="
            grep -n " error:" /tmp/xcode_build.log | grep -v "^[0-9]*:note:" | head -5
            echo ""
            echo "=== FULL ERROR CONTEXT (first error) ==="
            FIRST_ERR=$(grep -n " error:" /tmp/xcode_build.log | grep -v "^[0-9]*:note:" | head -1 | cut -d: -f1)
            if [ -n "$FIRST_ERR" ]; then
              START=$((FIRST_ERR - 5))
              END=$((FIRST_ERR + 20))
              sed -n "${START},${END}p" /tmp/xcode_build.log
            fi
          fi
          exit $BUILD_RESULT

    artifacts:
      - /tmp/xcode_build.log

    # publishing disabled for testing — enable when ready for TestFlight
    # publishing:
    #   app_store_connect:
